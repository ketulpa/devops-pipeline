global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587' // Use your actual email hostname here wiht SMTP port
  smtp_from: 'YOUR_eMAIL_ADDRESS'
  smtp_auth_username: 'YOUR_eMAIL_ADDRESS'
  smtp_auth_password: "YOUR_APP_PASSWORD"
  smtp_require_tls: true

route:
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 5m
  receiver: 'slack-alerts'
  routes:
    - match:
        severity: critical
      receiver: 'email-escalation'
      repeat_interval: 25m

receivers:
  - name: 'slack-alerts'
    slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#alerts'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🔴 ALERT{{ else }}✅ RESOLVED{{ end }}: {{ .CommonLabels.alertname }}'
        text: '*Server:* {{ .CommonLabels.instance }}\n*Issue:* {{ .CommonAnnotations.summary }}'

  - name: 'email-escalation'
    slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#alerts'
        send_resolved: true
        title: '🔴 ALERT: {{ .CommonLabels.alertname }}'
        text: '*Server:* {{ .CommonLabels.instance }}\n*Issue:* {{ .CommonAnnotations.summary }}'
    email_configs:
      - to: 'ketul9patel4@gmail.com'
        headers:
          Subject: '🚨 ESCALATION: {{ .CommonLabels.alertname }} not resolved after 5 alerts'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
