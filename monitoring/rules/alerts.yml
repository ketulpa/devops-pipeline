groups:
  - name: server-alerts
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Server {{ $labels.instance }} is DOWN"
          description: "{{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighCPULinux
        expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High CPU on {{ $labels.instance }}"
          description: "CPU usage is {{ $value }}% for more than 5 minutes."

      - alert: HighCPUWindows
        expr: 100 - (avg by(instance)(rate(windows_cpu_time_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High CPU on Windows {{ $labels.instance }}"
          description: "CPU usage is {{ $value }}% for more than 5 minutes."

      - alert: HighMemoryLinux
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High memory on {{ $labels.instance }}"
          description: "Memory usage is {{ $value }}% for more than 5 minutes."

      - alert: LowDiskLinux
        expr: (node_filesystem_free_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk free is {{ $value }}% on root partition."

      - alert: HighMemoryWindows
        expr: 100 - ((windows_memory_available_bytes / windows_os_visible_memory_bytes) * 100) > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High memory on Windows {{ $labels.instance }}"
          description: "Memory usage is {{ $value }}% for more than 5 minutes."

      - alert: LowDiskWindows
        expr: (windows_logical_disk_free_bytes / windows_logical_disk_size_bytes) * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk on Windows {{ $labels.instance }}"
          description: "Disk free is {{ $value }}% on {{ $labels.volume }}."

      - alert: HighMemoryWindows
        expr: 100 - ((windows_memory_available_bytes / windows_os_visible_memory_bytes) * 100) > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High memory on Windows {{ $labels.instance }}"
          description: "Memory usage is {{ $value }}% for more than 5 minutes."

      - alert: LowDiskWindows
        expr: (windows_logical_disk_free_bytes / windows_logical_disk_size_bytes) * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk on Windows {{ $labels.instance }}"
          description: "Disk free is {{ $value }}% on {{ $labels.volume }}."
