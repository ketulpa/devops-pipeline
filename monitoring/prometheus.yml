global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'linux-vps'
    static_configs:
      - targets: ['localhost:9100']

  - job_name: 'windows-vps'
    static_configs:
      - targets: ['173.248.136.194:9182']

  - job_name: 'flask-app'
    static_configs:
      - targets: ['localhost:5000']

